
services:
  # PostgreSQL Database with PostGIS
  postgres:
    image: postgis/postgis:17-3.5
    container_name: shadowcheck_postgres
    environment:
      POSTGRES_DB: shadowcheck
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d
    networks:
      - shadowcheck_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shadowcheck"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Backend API Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: shadowcheck_backend
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:admin@postgres:5432/shadowcheck
      - PGHOST=postgres
      - PGPORT=5432
      - PGDATABASE=shadowcheck
      - PGUSER=postgres
      - PGPASSWORD=admin
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shadowcheck_network
    restart: unless-stopped

  # Frontend React App
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: shadowcheck_frontend
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - shadowcheck_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  shadowcheck_network:
    driver: bridge
