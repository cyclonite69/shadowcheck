services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
      - "5173:5173"
    environment:
      - DATABASE_URL=postgres://user:pass@postgres:5432/shadowcheck
      - VITE_MAPBOX_TOKEN=${VITE_MAPBOX_TOKEN}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shadowcheck-net

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=shadowcheck
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d shadowcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shadowcheck-net

volumes:
  postgres-data:

networks:
  shadowcheck-net:
    driver: bridge
